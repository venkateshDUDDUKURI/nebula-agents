version: 1
current_stage: framework-bootstrap
stages:
  framework-bootstrap:
    description: Framework scaffolding and boundary hardening before solution implementation starts.
    required_gates:
      - boundary_genericness
      - skill_regression
  planning:
    description: Planning artifacts are being authored; implementation may still be placeholder.
    required_gates:
      - boundary_genericness
      - skill_regression
  implementation:
    description: Application runtime artifacts exist and implementation quality gates run.
    required_gates:
      - boundary_genericness
      - skill_regression
      - symbol_index_sync
      - inline_decisions_check
  release-readiness:
    description: Public-release hardening stage with strict quality/security gate evidence.
    required_gates:
      - boundary_genericness
      - skill_regression
      - symbol_index_sync
      - inline_decisions_check
      - kg_orphan_check
gates:
  boundary_genericness:
    description: Prevent solution-specific leakage into generic framework agents.
    command:
      - python3
      - agents/scripts/validate-genericness.py
  skill_regression:
    description: Validate skill metadata, structure quality, and routing regressions.
    command:
      - python3
      - agents/scripts/run-skill-regression.py
  symbol_index_sync:
    description: Validate symbol-index.yaml is in sync with code-index bindings.
    command:
      - python3
      - "{PRODUCT_ROOT}/scripts/kg/validate.py"
      - --check-symbols
  inline_decisions_check:
    description: Validate inline decision markers resolve to files, nodes, symbols, and ADRs.
    command:
      - python3
      - "{PRODUCT_ROOT}/scripts/kg/validate.py"
      - --check-decisions
  kg_orphan_check:
    description: |
      Warn on canonical nodes with no incoming refs and no code-index binding
      (ontology orphans), and report symbol-level dead-code candidates at high
      confidence. Cleanup gate run at release readiness; raw source remains
      authoritative.
    command:
      - python3
      - "{PRODUCT_ROOT}/scripts/kg/validate.py"
      - --check-orphans
